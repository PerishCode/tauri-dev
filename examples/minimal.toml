[project]
name = "example-sidecar-project"
namespace = "default"
root = "."

[app]
name = "desktop"
command = "pnpm"
args = ["tauri", "dev"]
cwd = "."
health_url = "http://127.0.0.1:1420"

[[sidecars]]
name = "api"
command = "cargo"
args = ["run", "-p", "example-api"]
cwd = "."
mode = "dev"
inspect_socket = "unix:///tmp/sidecar-example-api.sock"
health_url = "http://127.0.0.1:3901/health"

[[inspect.endpoints]]
name = "api-health"
kind = "http"
url = "http://127.0.0.1:3901/health"
